name: dr_george_pharmacy
description: نظام محاسبة صيدلية د/ جورج مجدي
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # Database
  sqflite: ^2.3.3
  path: ^1.9.0
  path_provider: ^2.1.3

  # State management
  provider: ^6.1.2

  # PDF / Excel export
  pdf: ^3.10.8
  printing: ^5.12.0
  excel: ^4.0.2
  open_filex: ^4.4.0

  # Formatting
  intl: ^0.19.0

  # Backup (copy db file / share)
  share_plus: ^9.0.0
  file_picker: ^8.0.6

  # Local auth / permissions (simple pin/password based, no external auth server)
  crypto: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.png
