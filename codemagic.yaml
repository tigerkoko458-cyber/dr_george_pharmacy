workflows:
  android-workflow:
    name: Build APK
    max_build_duration: 30
    environment:
      flutter: stable
    scripts:
      - name: Generate platform folders
        script: flutter create . --project-name dr_george_pharmacy --org com.drgeorge
      - name: Get packages
        script: flutter pub get
      - name: Build APK
        script: flutter build apk --release
    artifacts:
      - build/**/outputs/**/*.apk
